name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build · Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint (0 errors required)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Security gate: fail on any vulnerability in the dependencies that actually
      # ship to production. Dev-only tooling advisories are surfaced separately
      # (below) but do not block a release, since they never reach a deployed image.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=low

      - name: Audit all dependencies (informational)
        run: npm audit || true
